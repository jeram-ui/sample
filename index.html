<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Sign Up</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      /* Modern gradient + pattern */
      background: linear-gradient(135deg, #667eea, #764ba2);
      position: relative;
      overflow: hidden;
    }

    /* Floating blurred circles (background effect) */
    body::before, body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      z-index: 0;
    }

    body::before {
      width: 300px;
      height: 300px;
      background: #ff6ec4;
      top: -80px;
      left: -80px;
    }

    body::after {
      width: 300px;
      height: 300px;
      background: #42e695;
      bottom: -80px;
      right: -80px;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 90%;
      max-width: 360px;
      padding: 25px;

      /* Glass effect */
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      border-radius: 15px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      color: white;
    }

    h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    .input-group {
      margin-bottom: 15px;
    }

    .input-group label {
      font-size: 13px;
      display: block;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 5px;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .extra-links {
      margin-top: 12px;
      font-size: 13px;
      text-align: center;
    }

    .extra-links a {
      color: #fff;
      text-decoration: underline;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    /* Mobile optimization */
    @media (max-width: 480px) {
      .container {
        padding: 20px;
        border-radius: 12px;
      }

      .input-group input {
        padding: 10px;
        font-size: 13px;
      }

      .btn {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginForm">
    <h2>Login</h2>
    <form>
      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="btn">Login</button>
    </form>

    <div class="extra-links">
      <p><a onclick="showSignup()">Don't have an account? Sign up</a></p>
    </div>
  </div>

  <!-- SIGNUP -->
  <div id="signupForm" class="hidden">
    <h2>Sign Up</h2>
    <form>
      <div class="input-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Create a password" required>
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm your password" required>
      </div>

      <button type="submit" class="btn">Sign Up</button>
    </form>

    <div class="extra-links">
      <p><a onclick="showLogin()">Already have an account? Login</a></p>
    </div>
  </div>

</div>

<script>
  function showSignup() {
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("signupForm").classList.remove("hidden");
  }

  function showLogin() {
    document.getElementById("signupForm").classList.add("hidden");
    document.getElementById("loginForm").classList.remove("hidden");
  }
</script>

</body>
</html>
